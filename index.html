<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cupcake Heaven — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    :root {
      --deep:    #281C59;
      --teal:    #4E8D9C;
      --sage:    #85C79A;
      --cream:   #EDF7BD;
      --glass-bg: rgba(255,255,255,0.08);
      --glass-border: rgba(255,255,255,0.18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--deep) 0%, #1a1240 30%, #2d4a6e 60%, var(--teal) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Floating blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      animation: blobFloat 8s ease-in-out infinite;
      pointer-events: none;
    }
    .blob-1 { width: 400px; height: 400px; background: var(--teal); top: -100px; left: -100px; animation-delay: 0s; }
    .blob-2 { width: 350px; height: 350px; background: var(--sage); bottom: -80px; right: -80px; animation-delay: 3s; }
    .blob-3 { width: 250px; height: 250px; background: var(--cream); top: 50%; left: 60%; animation-delay: 5s; opacity: 0.12; }
    @keyframes blobFloat {
      0%, 100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(20px,-20px) scale(1.05); }
    }

    /* Cupcake sprinkles background */
    .sprinkles { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
    .sprinkle {
      position: absolute;
      width: 6px;
      height: 14px;
      border-radius: 3px;
      opacity: 0.15;
      animation: fall linear infinite;
    }
    @keyframes fall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 0.15; }
      100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }

    /* Login card */
    .login-card {
      background: var(--glass-bg);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      box-shadow:
        0 8px 32px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.2),
        0 0 0 1px rgba(255,255,255,0.05);
      position: relative;
      z-index: 10;
      animation: cardIn 0.7s cubic-bezier(.2,.8,.3,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo-area { text-align: center; margin-bottom: 32px; }
    .logo-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 8px;
      filter: drop-shadow(0 4px 12px rgba(133,199,154,0.4));
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .logo-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      font-weight: 900;
      color: var(--cream);
      letter-spacing: 0.01em;
      line-height: 1;
    }
    .logo-sub {
      font-size: 0.78rem;
      color: rgba(237,247,189,0.55);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* Form elements */
    .form-label {
      color: rgba(237,247,189,0.75);
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .input-wrap {
      position: relative;
      margin-bottom: 20px;
    }
    .input-wrap .bi {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 1rem;
      pointer-events: none;
      transition: color 0.2s;
    }
    .form-control {
      background: rgba(255,255,255,0.07) !important;
      border: 1px solid rgba(255,255,255,0.15) !important;
      border-radius: 14px !important;
      color: #fff !important;
      padding: 13px 16px 13px 42px !important;
      font-family: 'DM Sans', sans-serif !important;
      font-size: 0.95rem !important;
      transition: all 0.25s;
    }
    .form-control::placeholder { color: rgba(255,255,255,0.28) !important; }
    .form-control:focus {
      background: rgba(255,255,255,0.12) !important;
      border-color: var(--sage) !important;
      box-shadow: 0 0 0 3px rgba(133,199,154,0.2) !important;
      outline: none !important;
    }
    .form-control:focus + .bi,
    .input-wrap:focus-within .bi { color: var(--sage) !important; }
    /* fix icon z-index */
    .input-wrap .bi { z-index: 2; }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: rgba(255,255,255,0.35);
      transition: color 0.2s;
      z-index: 3;
    }
    .toggle-pw:hover { color: var(--cream); }

    /* Login button */
    .btn-login {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, var(--teal), var(--sage));
      color: var(--deep);
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 4px 20px rgba(78,141,156,0.4);
      position: relative;
      overflow: hidden;
    }
    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.2s;
    }
    .btn-login:hover::before { background: rgba(255,255,255,0.12); }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(78,141,156,0.5); }
    .btn-login:active { transform: translateY(0); }

    /* Error */
    .alert-err {
      background: rgba(220,53,69,0.15);
      border: 1px solid rgba(220,53,69,0.3);
      border-radius: 12px;
      color: #ff8a9b;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}
    }
    .alert-err.show { display: flex; align-items: center; gap: 8px; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: rgba(255,255,255,0.2);
      font-size: 0.75rem;
    }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.1); }

    .hint {
      text-align: center;
      font-size: 0.75rem;
      color: rgba(237,247,189,0.3);
      margin-top: 20px;
    }
    .hint span { color: rgba(133,199,154,0.6); }
  </style>
</head>
<body>

  <!-- Background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Falling sprinkles -->
  <div class="sprinkles" id="sprinkles"></div>

  <div class="login-card">
    <div class="logo-area">
      <span class="logo-icon">🧁</span>
      <div class="logo-title">Cupcake Heaven</div>
      <div class="logo-sub">Artisan Bakery &amp; Sweet Studio</div>
    </div>

    <div class="alert-err" id="errMsg">
      <i class="bi bi-exclamation-circle-fill"></i>
      <span id="errText">Invalid username or password.</span>
    </div>

    <div class="input-wrap">
      <label class="form-label" for="username">Username</label>
      <input type="text" class="form-control" id="username" placeholder="Enter your username" autocomplete="off"/>
      <i class="bi bi-person-fill"></i>
    </div>

    <div class="input-wrap">
      <label class="form-label" for="password">Password</label>
      <input type="password" class="form-control" id="password" placeholder="Enter your password"/>
      <i class="bi bi-lock-fill"></i>
      <i class="bi bi-eye-slash toggle-pw" id="togglePw"></i>
    </div>

    <div class="divider">Secure Login</div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <i class="bi bi-box-arrow-in-right me-2"></i>Enter the Bakery
    </button>

    <div class="hint">
      Default: <span>admin</span> / <span>@dmin123</span>
    </div>
  </div>

  <script>
    // Sprinkle colors
    const colors = ['#85C79A','#4E8D9C','#EDF7BD','#281C59','#fff','#f9a8d4'];
    const sprinklesEl = document.getElementById('sprinkles');
    for (let i = 0; i < 30; i++) {
      const s = document.createElement('div');
      s.className = 'sprinkle';
      s.style.cssText = `
        left:${Math.random()*100}%;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${4+Math.random()*6}s;
        animation-delay:${Math.random()*6}s;
        transform:rotate(${Math.random()*360}deg);
      `;
      sprinklesEl.appendChild(s);
    }

    // Toggle password
    document.getElementById('togglePw').addEventListener('click', function(){
      const pw = document.getElementById('password');
      if (pw.type === 'password') { pw.type = 'text'; this.className = 'bi bi-eye toggle-pw'; }
      else { pw.type = 'password'; this.className = 'bi bi-eye-slash toggle-pw'; }
    });

    // Enter key
    document.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

    function doLogin() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      const err = document.getElementById('errMsg');
      const errTxt = document.getElementById('errText');

      if (!u || !p) {
        errTxt.textContent = 'Please fill in all fields.';
        err.classList.add('show');
        return;
      }
      if (u === 'admin' && p === '@dmin123') {
        err.classList.remove('show');
        document.getElementById('loginBtn').innerHTML = '<i class="bi bi-check-circle-fill me-2"></i>Welcome! Redirecting...';
        document.getElementById('loginBtn').style.background = 'linear-gradient(135deg,#85C79A,#4E8D9C)';
        sessionStorage.setItem('ch_auth', '1');
        setTimeout(() => { window.location.href = 'store.html'; }, 900);
      } else {
        errTxt.textContent = 'Invalid username or password. Try again.';
        err.classList.add('show');
        setTimeout(() => err.classList.remove('show'), 3500);
      }
    }
  </script>
</body>
</html>
